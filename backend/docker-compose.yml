version: '3.8'

services:
  mongodb:
    image: mongo:6.0-alpine
    container_name: emergency-gas-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: EmergencyGas@123
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - emergency-gas
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: emergency-gas-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:EmergencyGas@123@mongodb:27017/emergency-gas?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      JWT_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - /app/node_modules
    networks:
      - emergency-gas
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: MongoDB UI
  mongo-express:
    image: mongo-express:1.0.0
    container_name: emergency-gas-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: EmergencyGas@123
      ME_CONFIG_MONGODB_URL: mongodb://admin:EmergencyGas@123@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - emergency-gas
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:

networks:
  emergency-gas:
    driver: bridge
