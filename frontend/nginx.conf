server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ✅ CORS headers for API/Socket.IO requests
  add_header 'Access-Control-Allow-Origin' '*' always;
  add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
  add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

  # ✅ NO Content-Security-Policy header here
  # Socket.IO client uses eval() internally—CSP would block it
  # If you need CSP, use: 'unsafe-eval' in script-src (not recommended for prod)

  # Cache static assets (1 year for fingerprinted files)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA routing — all unknown routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;
  gzip_comp_level 6;
}