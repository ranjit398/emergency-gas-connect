version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: gasconnect-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: emergency-gas
    networks:
      - gasconnect

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gasconnect-backend
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/emergency-gas
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRY: 30d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_LEVEL: info
    depends_on:
      - mongodb
    networks:
      - gasconnect

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5002/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5002}
    container_name: gasconnect-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gasconnect

volumes:
  mongo_data:

networks:
  gasconnect:
    driver: bridge