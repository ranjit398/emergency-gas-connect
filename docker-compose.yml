version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: gasconnect-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: emergency-gas
    networks:
      - gasconnect
    # ✅ Added: healthcheck so backend waits for mongo to be truly ready
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gasconnect-backend
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/emergency-gas
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRY: 30d
      # ✅ Fix: was defaulting to localhost:5173 which breaks in Docker networking.
      # The frontend container is accessed via its service name inside Docker,
      # but for CORS the browser sends requests from the HOST machine's perspective.
      # Set CORS_ORIGIN in your .env to the actual domain (Render URL or localhost).
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: info
    depends_on:
      mongodb:
        # ✅ Fix: was depends_on without condition — backend started before mongo was ready
        condition: service_healthy
    networks:
      - gasconnect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5002/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5002}
    container_name: gasconnect-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        # ✅ Fix: wait for backend to be healthy before starting frontend
        condition: service_healthy
    networks:
      - gasconnect

volumes:
  mongo_data:

networks:
  gasconnect:
    driver: bridge